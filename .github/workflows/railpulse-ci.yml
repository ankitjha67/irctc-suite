name: railpulse-ci

on:
  push:
    branches: [main]
    paths:
      - "railpulse/**"
      - ".github/workflows/railpulse-ci.yml"
  pull_request:
    paths:
      - "railpulse/**"
      - ".github/workflows/railpulse-ci.yml"

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: railpulse
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: railpulse/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy app/ --ignore-missing-imports

      - name: Pytest
        run: pytest -q
